<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moitra Studios - Grand Strategy Games</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lato:wght@300;400;700&family=Rajdhani:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Lato', sans-serif;
      scroll-behavior: smooth;
      background-color: #020617;
      color: #e2e8f0;
    }

    h1,
    h2,
    h3,
    h4,
    .font-cinzel {
      font-family: 'Cinzel', serif;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #020617;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #d97706;
    }

    @keyframes hinge-swing {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      20% {
        transform: translate(0, 0) rotate(5deg);
      }

      40% {
        transform: translate(0, 0) rotate(-3deg);
      }

      60% {
        transform: translate(0, 0) rotate(2deg);
      }

      80% {
        transform: translate(0, 0) rotate(-1deg);
      }

      100% {
        transform: translate(0, 0) rotate(0deg);
      }
    }

    .animate-hinge-swing {
      animation: hinge-swing 5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
    }
  </style>
</head>

<body class="text-slate-200 selection:bg-gameOrange selection:text-white">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
