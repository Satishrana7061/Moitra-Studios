// .github/workflows/reel-schedule.yml
name: Automated Reel Pipeline Schedule

on:
  schedule:
    # 6:30 PM UTC = 12:00 AM IST (incorrect) – need correct times
    # IST is UTC+5:30, so 6 PM IST = 12:30 PM UTC, 8 PM IST = 2:30 PM UTC
    - cron: '30 12 * * *'   # 6:30 PM IST (12:30 UTC)
    - cron: '30 14 * * *'   # 8:30 PM IST (14:30 UTC)
  workflow_dispatch:
    inputs:
      manual:
        description: 'Run manually'
        required: false
        default: 'false'

jobs:
  run-reel-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Run Reel Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VITE_GITHUB_PAT: ${{ secrets.GITHUB_PAT }}
        run: npx tsx src/runPipeline.ts
