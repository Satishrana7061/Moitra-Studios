name: Daily Automated Reels Pipeline

on:
  schedule:
    # 11:30 UTC = 5:00 PM IST
    - cron: '30 11 * * *'
    # 14:30 UTC = 8:00 PM IST
    - cron: '30 14 * * *'
  workflow_dispatch:
    inputs:
      news_slug:
        description: 'Specific news slug to process (optional)'
        required: false
      news_title:
        description: 'Specific news title (optional)'
        required: false
  repository_dispatch:
    types: [daily-reels-manual]


jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'rajneeti-backend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./rajneeti-backend
        run: npm ci

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Puppeteer Browsers
        working-directory: ./rajneeti-backend
        run: npx puppeteer browsers install chrome

      - name: Run Pipeline
        working-directory: ./rajneeti-backend
        env:
          # System
          FRONTEND_URL: "https://moitrastudios.com"
          ENABLE_AUTO_POSTING: "true"
          
          # AI & Audio
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          
          # Supabase Storage
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}

          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Social Credentials
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          
          # Optional Inputs
          NEWS_SLUG: ${{ github.event.inputs.news_slug || github.event.client_payload.slug }}
          NEWS_TITLE: ${{ github.event.inputs.news_title || github.event.client_payload.title }}
          NEWS_SUMMARY: ${{ github.event.client_payload.summary }}


        run: npx tsx src/runPipeline.ts

