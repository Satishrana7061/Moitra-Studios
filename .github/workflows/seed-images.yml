name: Download Images Related to Promises

on:
  workflow_dispatch:

jobs:
  seed-images:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'rajneeti-backend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./rajneeti-backend
        run: npm ci

      - name: Run Image Seeding Script
        working-directory: ./rajneeti-backend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx src/seed_promise_images.ts
