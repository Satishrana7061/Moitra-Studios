name: Daily Automated Reels Pipeline

on:
  schedule:
    # Runs at 2:00 AM UTC every day (7:30 AM IST)
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    
    # We need to install necessary packages for Puppeteer to run headless Chrome on Ubuntu
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'rajneeti-backend/package-lock.json'

      - name: Install Dependencies
        working-directory: ./rajneeti-backend
        run: npm ci

      - name: Install Puppeteer Browsers
        working-directory: ./rajneeti-backend
        run: npx puppeteer browsers install chrome

      - name: Run Pipeline
        working-directory: ./rajneeti-backend
        env:
          # System
          FRONTEND_URL: "https://moitrastudios.com"
          
          # AI & Audio
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}
          
          # Supabase Storage (Required for Instagram)
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          
          # Instagram Credentials
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          
          # YouTube Credentials
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: npx tsx src/runPipeline.ts
