# .github/workflows/daily-news.yml
name: Update Daily Political News

on:
  schedule:
    # 5:30 AM IST = 00:00 UTC every day
    - cron: '0 0 * * *'
  workflow_dispatch: # Manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run news automation script
      env:
        OPENAI_API_KEY:          ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python daily_news_automation.py

    - name: Commit and push daily_news.json
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        if [[ `git status --porcelain` ]]; then
          git add public/daily_news.json
          git commit -m "chore: auto-update daily news"
          git push
        else
          echo "No changes to daily_news.json"
        fi
