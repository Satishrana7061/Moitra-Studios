# .github/workflows/daily-news.yml
name: Update Daily Political News

on:
  schedule:
    # Runs at 00:00 UTC every day (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to push commits back to the repo

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-generativeai openai

    - name: Run news automation script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Keeping just in case
      run: python daily_news_automation.py

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Only commit if there are changes
        if [[ `git status --porcelain` ]]; then
          git add public/daily_news.json
          git commit -m "Auto-update daily news [skip ci]"
          git push
        else
          echo "No changes to commit"
        fi
